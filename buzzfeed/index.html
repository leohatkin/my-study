<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEXUS_v17_LEGACY</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #4eff66;
            --focus: #ff0055;
            --bg: #050505;
            --panel: #0f0f0f;
            --border: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: #eee; 
            font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header {
            height: 40px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 25px; justify-content: space-between;
        }

    
        main {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 10px 20px;
        }

        .screen-unit { width: 100%; max-width: 900px; display: flex; flex-direction: column; }

        #monitor-box {
            width: 100%; aspect-ratio: 16 / 9; background: #000;
            border: 2px solid var(--border); border-radius: 4px;
            overflow: hidden; position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        #display-img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.6s ease;
        }

        /* CAPTION SYSTEM */
        .sub-container {
            margin-top: 15px; 
            height: 70px; /* Fixed height: UI will never jump */
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow-y: auto; 
            padding: 0 15px;
        }

        .sub-container::-webkit-scrollbar { width: 3px; }
        .sub-container::-webkit-scrollbar-thumb { background: var(--neon); }

        #subtitle {
            font-size: 20px; color: #fff; text-transform: uppercase;
            letter-spacing: 1px; font-weight: bold; text-align: center;
        }

        /* CONSOLE */
        .console-panel {
            margin-top: 15px; width: 100%; display: flex; gap: 10px;
            padding: 15px; background: #0a0a0a; border: 1px solid #222; border-radius: 4px;
        }

        .console-input {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 12px; outline: none; font-family: 'Share Tech Mono'; font-size: 14px;
        }

        #prompt-in { flex-grow: 1; border-left: 3px solid var(--neon); }
        .size-in { width: 90px; text-align: center; color: var(--neon); }

        .exe-btn {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 0 25px; cursor: pointer; font-weight: bold;
            font-family: 'Share Tech Mono'; transition: 0.3s;
        }
        .exe-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        /* FIXED GALLERY */
        footer {
            height: 100px; background: #000; border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 15px; gap: 12px; 
            overflow-x: auto; overflow-y: hidden;
        }

        .thumb {
            width: 70px; height: 70px; object-fit: cover;
            border: 1px solid #333; cursor: pointer; flex-shrink: 0;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: #111;
        }

        .thumb:hover { 
            border-color: var(--neon); 
            transform: translateY(-5px); 
            box-shadow: 0 5px 15px rgba(78, 255, 102, 0.3);
        }

        /* MODERN LIGHTBOX (The Pop-Up) */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); /* Modern blur effect */
            display: none; 
            justify-content: center; align-items: center; 
            z-index: 9999; /* Ensure it is on top */
            cursor: zoom-out;
        }

        #lb-img { 
            max-width: 90%; max-height: 85%; 
            border: 2px solid #333; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
            border-radius: 4px;
        }

        /* ANIMATIONS */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        #status-tag { animation: blink 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <header>
        <div id="status-tag" style="font-size: 10px; color: var(--neon); letter-spacing: 2px;">SIGNAL: LIVE_SYNC</div>
        <div id="mode-tag" style="font-size: 10px; color: #555;">NEXUS_OS_V17</div>
    </header>

    <main>
        <div class="screen-unit">
            <div id="monitor-box">
                <img id="display-img" src="">
            </div>

            <div class="sub-container">
                <p id="subtitle">INITIALIZING_ENCRYPTION...</p>
            </div>

            <div class="console-panel">
                <input type="text" id="prompt-in" class="console-input" placeholder="> INJECT_DIRECTIVE..." onkeypress="if(event.key==='Enter') generate()">
                <input type="number" id="w-in" class="console-input size-in" placeholder="1280">
                <input type="number" id="h-in" class="console-input size-in" placeholder="720">
                <button class="exe-btn" onclick="generate()">CREATE</button>
            </div>
        </div>
    </main>

    <footer id="gallery"></footer>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="" alt="Zoom View">
    </div>

    <script>
        const img = document.getElementById('display-img');
        const sub = document.getElementById('subtitle');
        const stat = document.getElementById('status-tag');
        const gallery = document.getElementById('gallery');
        const lbImg = document.getElementById('lb-img');
        const lightbox = document.getElementById('lightbox');
        
        let focusActive = false;
        let es = null;

        function update(url, text) {
            img.style.opacity = '0';
            const loader = new Image();
            loader.src = url;
            loader.onload = () => {
                img.src = url;
                sub.innerText = text;
                img.style.opacity = '1';
                document.querySelector('.sub-container').scrollTop = 0;
            };
        }

        function connect() {
            if (es) es.close();
            es = new EventSource("https://image.pollinations.ai/feed");
            es.onmessage = (e) => {
                if (focusActive) return;
                const data = JSON.parse(e.data);
                if (data.imageURL) update(data.imageURL, data.prompt);
            };
            es.onerror = () => {
                es.close();
                if (!focusActive) {
                    update(`https://picsum.photos/seed/${Math.random()}/1280/720`, "SIGNAL_RECOVERING_LINK...");
                }
                setTimeout(connect, 5000);
            };
        }

        function generate() {
            const p = document.getElementById('prompt-in').value;
            const w = document.getElementById('w-in').value || 1280;
            const h = document.getElementById('h-in').value || 720;
            if (!p) return;

            focusActive = true;
            stat.innerText = "SIGNAL: INJECTED_OVERRIDE";
            stat.style.color = "var(--focus)";

            const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?width=${w}&height=${h}&nologo=true&seed=${Math.random()}`;
            
            update(url, p);
            document.getElementById('prompt-in').value = "";

            // Create Thumbnail
            const t = document.createElement('img');
            t.src = url; 
            t.className = 'thumb';
            // Pop-up Logic
            t.onclick = (e) => { 
                e.stopPropagation(); // Stop from reloading on main screen
                lbImg.src = url; 
                lightbox.style.display = 'flex'; 
            };
            gallery.prepend(t);

             setTimeout(() => {
                focusActive = false;
                stat.innerText = "SIGNAL: LIVE_SYNC";
                stat.style.color = "var(--neon)";
            }, 12000);
        }

        connect();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #4eff66;
            --focus: #ff0055;
            --bg: #050505;
            --panel: #0f0f0f;
            --border: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: #eee; 
            font-family: 'Share Tech Mono', monospace;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; overflow: hidden;
        }

        header {
            height: 35px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; justify-content: space-between;
        }

        main {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 10px;
        }

        
        .screen-unit { width: 100%; max-width: 780px; display: flex; flex-direction: column; }

        #monitor-box {
            width: 100%; aspect-ratio: 16 / 9; background: #000;
            border: 1px solid var(--border); border-radius: 4px;
            overflow: hidden; position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        #display-img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.6s ease;
        }

        .sub-container {
            margin-top: 10px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow-y: auto; 
            padding: 0 10px;
        }

        #subtitle {
            font-size: 16px; color: #fff; text-transform: uppercase;
            letter-spacing: 1px; font-weight: bold; text-align: center;
        }

        .console-panel {
            margin-top: 10px; width: 100%; display: flex; gap: 8px;
            padding: 12px; background: #0a0a0a; border: 1px solid #222; border-radius: 4px;
        }

        .console-input {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 10px; outline: none; font-family: 'Share Tech Mono'; font-size: 13px;
        }

        #prompt-in { flex-grow: 1; border-left: 3px solid var(--neon); }
        .size-in { width: 80px; text-align: center; color: var(--neon); }

        .exe-btn {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 0 20px; cursor: pointer; font-weight: bold;
            font-family: 'Share Tech Mono'; transition: 0.3s; font-size: 13px;
        }
        .exe-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        footer {
            height: 85px; background: #000; border-top: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 15px; gap: 10px; 
            overflow-x: auto;
        }

        .thumb {
            width: 60px; height: 60px; object-fit: cover;
            border: 1px solid #333; cursor: pointer; flex-shrink: 0;
            transition: 0.3s;
        }
        .thumb:hover { border-color: var(--neon); transform: translateY(-5px); }

        #lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; 
            z-index: 9999; cursor: zoom-out;
        }
        #lb-img { max-width: 90%; max-height: 85%; border: 2px solid #333; border-radius: 4px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        #status-tag { animation: blink 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <header>
        <div id="status-tag" style="font-size: 10px; color: var(--neon); letter-spacing: 2px;">SIGNAL: READY</div>
        <div id="mode-tag" style="font-size: 10px; color: #555;">NEXUS_v17_BRIDGE</div>
    </header>

    <main>
        <div class="screen-unit">
            <div id="monitor-box">
                <img id="display-img" src="">
            </div>

            <div class="sub-container">
                <p id="subtitle">SYSTEM_READY</p>
            </div>

            <div class="console-panel">
                <input type="text" id="prompt-in" class="console-input" placeholder="> CREATE..." onkeypress="if(event.key==='Enter') generate()">
                <input type="number" id="w-in" class="console-input size-in" placeholder="1280">
                <input type="number" id="h-in" class="console-input size-in" placeholder="720">
                <button class="exe-btn" onclick="generate()">CREATE</button>
            </div>
        </div>
    </main>

    <footer id="gallery"></footer>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lb-img" src="">
    </div>

    <script>
        const img = document.getElementById('display-img');
        const sub = document.getElementById('subtitle');
        const stat = document.getElementById('status-tag');
        const gallery = document.getElementById('gallery');
        const lbImg = document.getElementById('lb-img');
        const lightbox = document.getElementById('lightbox');

        function update(url, text) {
            img.style.opacity = '0';
            const loader = new Image();
            loader.src = url;
            loader.onload = () => {
                img.src = url;
                sub.innerText = text;
                img.style.opacity = '1';
            };
        }

        async function generate() {
            const userInput = document.getElementById('prompt-in').value;
            const w = document.getElementById('w-in').value || 1280;
            const h = document.getElementById('h-in').value || 720;
            
            if (!userInput) return;

            stat.innerText = "SIGNAL: ACCESSING_GITHUB_API";
            stat.style.color = "#ffaa00";
            sub.innerText = "FETCHING_REMOTE_LOGIC...";

            try {
                const apiConfigUrl = 'https://raw.githubusercontent.com/leohatkin/my-study/main/logic.json';
                const response = await fetch(apiConfigUrl);
                
                if (!response.ok) throw new Error("GitHub Config unreachable");
                
                const config = await response.json();
                const finalPrompt = `${config.system_prefix} ${userInput}`;
                const finalUrl = `${config.api_endpoint}${encodeURIComponent(finalPrompt)}${config.default_params}&width=${w}&height=${h}&seed=${Math.random()}`;

                update(finalUrl, userInput);
                
                const t = document.createElement('img');
                t.src = finalUrl;
                t.className = 'thumb';
                t.onclick = (e) => { 
                    e.stopPropagation();
                    lbImg.src = finalUrl; 
                    lightbox.style.display = 'flex'; 
                };
                gallery.prepend(t);

                stat.innerText = "SIGNAL: SUCCESS";
                stat.style.color = "var(--neon)";

            } catch (error) {
                console.error("Error en el Bridge:", error);
                stat.innerText = "SIGNAL: BRIDGE_ERROR";
                sub.innerText = "CONNECTION_FAILED";
            } finally {
                document.getElementById('prompt-in').value = "";
            }
        }

        window.onload = () => {
            sub.innerText = "SYSTEM_READY";
        };
    </script>
</body>
</html>
